<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio DAW — Architecture Explorer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --surface: #181818; --surface2: #242424; --surface3: #323232;
  --accent: #b0b0b8; --accentHi: #e0e0e8; --text: #f0f0f2; --muted: #686870;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Text', 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* TOP BAR */
#topbar { background: var(--surface); border-bottom: 1px solid var(--surface3); padding: 0 16px; display: flex; align-items: center; gap: 10px; height: 46px; flex-shrink: 0; }
#topbar h1 { font-size: 12px; font-weight: 600; color: var(--accentHi); white-space: nowrap; letter-spacing: 0.03em; }
.sep { width: 1px; height: 18px; background: var(--surface3); margin: 0 2px; }
.fbtn { background: var(--surface2); border: 1px solid var(--surface3); color: var(--muted); font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer; white-space: nowrap; transition: all 0.12s; }
.fbtn:hover { color: var(--text); border-color: var(--accent); }
.fbtn.on { background: #282828; color: var(--accentHi); border-color: var(--accent); }
.fbtn[data-r="critical"].on { color: #ff6060; border-color: #cc3333; }
.fbtn[data-r="high"].on { color: #f09050; border-color: #c06020; }
.fbtn[data-r="medium"].on { color: #e0c020; border-color: #b89010; }
.fbtn[data-r="low"].on { color: #40c070; border-color: #2a8a4a; }
#search { background: var(--surface2); border: 1px solid var(--surface3); color: var(--text); font-size: 11px; padding: 3px 10px; border-radius: 4px; outline: none; width: 150px; margin-left: auto; }
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--muted); }

/* MAIN */
#main { display: flex; flex: 1; overflow: hidden; }
#gc { flex: 1; position: relative; overflow: hidden; }
svg { width: 100%; height: 100%; }

/* GRAPH */
.band-rect { opacity: 0.18; }
.band-lbl { font: 700 10px -apple-system; letter-spacing: 0.14em; text-transform: uppercase; fill: #fff; opacity: 0.28; pointer-events: none; }
.lnk { stroke: #333; stroke-opacity: 0.55; fill: none; stroke-width: 1; }
.lnk.hi { stroke-opacity: 0.85; stroke-width: 2; }
.nd { cursor: pointer; }
.nd circle { stroke-width: 1.5; transition: stroke-width 0.1s; }
.nd:hover circle { stroke-width: 3; }
.nd.sel circle { stroke-width: 3; }
.nd.dim { opacity: 0.1; }
.nd text { font: 9px -apple-system; fill: #ccc; pointer-events: none; text-anchor: middle; }

/* PANEL */
#panel { width: 340px; background: var(--surface); border-left: 1px solid var(--surface3); overflow-y: auto; flex-shrink: 0; }
#panel-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 12px; gap: 10px; text-align: center; padding: 24px; }
#panel-empty .ico { font-size: 36px; opacity: 0.2; }
#panel-body { padding: 16px; display: none; }
.p-name { font-size: 13px; font-weight: 600; color: var(--accentHi); word-break: break-all; margin-bottom: 3px; }
.p-path { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
.p-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.bdg { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; }
.bdg-critical { background: rgba(204,51,51,.18); color: #ff6060; border: 1px solid rgba(204,51,51,.4); }
.bdg-high { background: rgba(192,96,32,.18); color: #f09050; border: 1px solid rgba(192,96,32,.4); }
.bdg-medium { background: rgba(184,144,16,.18); color: #e0c020; border: 1px solid rgba(184,144,16,.4); }
.bdg-low { background: rgba(42,138,74,.18); color: #40c070; border: 1px solid rgba(42,138,74,.4); }
.bdg-layer { background: var(--surface2); color: var(--accent); border: 1px solid var(--surface3); }
.p-role { font-size: 11px; color: var(--accent); line-height: 1.55; border-left: 2px solid var(--surface3); padding-left: 8px; margin-bottom: 14px; }
.sec-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.bar-track { flex: 1; height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }
.bar-val { font-size: 12px; font-weight: 600; color: var(--accentHi); white-space: nowrap; }
.cls-item { padding: 5px 8px; background: var(--surface2); border-left: 2px solid var(--surface3); border-radius: 4px; margin-bottom: 4px; }
.cls-name { font-size: 11px; font-weight: 600; color: var(--accentHi); font-family: 'SF Mono', 'Fira Code', monospace; }
.cls-role { font-size: 10px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.dep-item { font-size: 10px; color: var(--accent); padding: 2px 0; display: flex; align-items: center; gap: 5px; font-family: monospace; }
.dep-item::before { content: '→'; color: var(--muted); }
.dep-item.in { color: #888; }
.dep-item.in::before { content: '←'; }
.iss-item { font-size: 10px; color: var(--muted); padding: 3px 0 3px 14px; position: relative; line-height: 1.4; }
.iss-item::before { content: '⚠'; position: absolute; left: 0; color: #b89010; }
.sec { margin-bottom: 14px; }

/* TOOLTIP */
#tt { position: fixed; background: var(--surface); border: 1px solid var(--surface3); border-radius: 6px; padding: 7px 12px; font-size: 11px; pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 999; }
#tt.vis { opacity: 1; }
#tt-name { font-weight: 600; color: var(--accentHi); margin-bottom: 2px; }
#tt-sub { color: var(--muted); }

/* BOTTOM */
#bot { background: var(--surface); border-top: 1px solid var(--surface3); padding: 0 16px; display: flex; align-items: center; gap: 16px; font-size: 10px; color: var(--muted); height: 26px; flex-shrink: 0; }
.bstat { display: flex; align-items: center; gap: 4px; }
.bstat b { color: var(--accent); }
#legend { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.ldot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 3px; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

/* Function list */
.fn-filter-row { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
.fn-fbtn { background:var(--surface3); border:none; color:var(--muted); font-size:10px; padding:2px 7px; border-radius:3px; cursor:pointer; }
.fn-fbtn.on { background:#383838; color:var(--accentHi); }
#fn-search { background:var(--surface2); border:1px solid var(--surface3); color:var(--text); font-size:10px; padding:2px 7px; border-radius:3px; outline:none; width:100%; margin-bottom:6px; }
#fn-search::placeholder { color:var(--muted); }
.fn-group { margin-bottom:8px; }
.fn-group-title { font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); padding:3px 0; border-bottom:1px solid var(--surface3); margin-bottom:4px; }
.fn-item { padding:4px 8px; border-radius:3px; margin-bottom:2px; cursor:default; border-left:2px solid transparent; }
.fn-item:hover { background:var(--surface2); }
.fn-item.pub { border-left-color:#2a8a4a22; }
.fn-item.prot { border-left-color:#b8901022; }
.fn-item.priv { border-left-color:#32323288; }
.fn-sig { font-size:10px; color:var(--accentHi); font-family:'SF Mono','Fira Code',monospace; word-break:break-all; line-height:1.35; }
.fn-desc { font-size:10px; color:var(--muted); margin-top:1px; line-height:1.35; }
.fn-badge { font-size:9px; font-weight:700; padding:1px 5px; border-radius:2px; margin-right:4px; }
.fn-pub { background:rgba(42,138,74,.15); color:#40c070; }
.fn-prot { background:rgba(184,144,16,.15); color:#e0c020; }
.fn-priv { background:rgba(100,100,100,.15); color:#888; }
.fn-count { font-size:10px; color:var(--muted); margin-left:4px; }

</style>
</head>

rComponent","access":"public","sig":"void listBoxItemDoubleClicked(int row, const juce::MouseEvent&) override","desc":"Loads plugin on double-click"},{"class":"PluginBrowserWindow","access":"public","sig":"void showForChannel(int ch)","desc":"Shows browser for channel targeting"},{"class":"PluginBrowserWindow","access":"public","sig":"int getTargetChannel() const","desc":"Returns target channel"},{"class":"PluginBrowserWindow","access":"public","sig":"void closeButtonPressed() override","desc":"Hides window"},{"class":"PluginEditorWindow","access":"public","sig":"PluginEditorWindow(juce::AudioPluginInstance& plugin, int ch)","desc":"Constructor - wraps plugin editor"},{"class":"PluginEditorWindow","access":"public","sig":"void closeButtonPressed() override","desc":"Hides window"}],"dynamicequi":[{"class":"DynamicEQComponent","access":"public","sig":"void paint(juce::Graphics&) override","desc":"Draws EQ band controls and metering"},{"class":"DynamicEQComponent","access":"public","sig":"void resized() override","desc":"Layouts band controls"},{"class":"DynamicEQComponent","access":"public","sig":"void loadParams(const DynamicEQProcessor& proc)","desc":"Updates UI from processor"},{"class":"DynamicEQComponent","access":"public","sig":"void getParams(DynamicEQProcessor& proc) const","desc":"Reads params from UI to processor"}],"lookandfeel":[{"class":"StudioLookAndFeel","access":"public","sig":"static juce::Colour rim()","desc":"Returns rim color (white @ 11% alpha)"},{"class":"StudioLookAndFeel","access":"public","sig":"static juce::Colour specular()","desc":"Returns specular color (white @ 7% alpha)"},{"class":"StudioLookAndFeel","access":"public","sig":"StudioLookAndFeel()","desc":"Constructor - applies dark theme colors"},{"class":"StudioLookAndFeel","access":"public","sig":"void drawButtonBackground(juce::Graphics&, juce::Button&, const juce::Colour&, bool, bool) override","desc":"Draws professional rounded button with inset shadow"},{"class":"StudioLookAndFeel","access":"public","sig":"void drawButtonText(juce::Graphics&, juce::TextButton&, bool, bool) override","desc":"Draws button text with conditional opacity"},{"class":"StudioLookAndFeel","access":"public","sig":"void drawRotarySlider(juce::Graphics&, int, int, int, int, float, float, float, juce::Slider&) override","desc":"Draws hardware encoder-style rotary knob"},{"class":"StudioLookAndFeel","access":"public","sig":"void drawLinearSliderBackground(juce::Graphics&, int, int, int, int, float, float, float, juce::Slider::SliderStyle, juce::Slider&) override","desc":"Draws vertical/horizontal slider track"},{"class":"StudioLookAndFeel","access":"public","sig":"void drawLinearSliderThumb(juce::Graphics&, int, int, int, int, float, float, float, juce::Slider::SliderStyle, juce::Slider&) override","desc":"Draws slider thumb"},{"class":"StudioLookAndFeel","access":"public","sig":"void drawScrollbar(juce::Graphics&, juce::ScrollBar&, int, int, int, int, bool, int, int, bool, bool) override","desc":"Draws custom scrollbar thumb"},{"class":"StudioLookAndFeel","access":"public","sig":"int getDefaultScrollbarWidth() override","desc":"Returns scrollbar width (8px)"},{"class":"StudioLookAndFeel","access":"public","sig":"void drawComboBox(juce::Graphics&, int, int, bool, int, int, int, int, juce::ComboBox&) override","desc":"Draws combo box with chevron"},{"class":"StudioLookAndFeel","access":"public","sig":"void drawAlertBox(juce::Graphics&, juce::AlertWindow&, const juce::Rectangle<int>&, juce::TextLayout&) override","desc":"Draws alert window"}],"trackpad":[{"class":"TrackpadController","access":"public","sig":"TrackpadController()","desc":"Constructor - creates Objective-C++ pimpl"},{"class":"TrackpadController","access":"public","sig":"~TrackpadController()","desc":"Destructor - cleans up pimpl"},{"class":"TrackpadController","access":"public","sig":"void start()","desc":"Starts macOS trackpad multitouch event stream"},{"class":"TrackpadController","access":"public","sig":"void stop()","desc":"Stops trackpad event stream"},{"class":"TrackpadController","access":"public","sig":"bool isRunning() const","desc":"Returns true if listening to trackpad"}]};

// ── CONFIG ───────────────────────────────────────────────────────────────────

const RISK_COL = { critical:"#cc3333", high:"#c06020", medium:"#b89010", low:"#2a8a4a" };
const LAYER_COL = { entry:"#1a1a2e", data:"#0d240d", audio:"#240d0d", live:"#0d0d24", ui:"#1e1e0d" };
const LAYER_Y  = { entry:0.08, data:0.30, audio:0.55, live:0.55, ui:0.82 };
const LAYER_X  = { entry:0.50, data:0.18, audio:0.52, live:0.80, ui:0.50 };

const MAX_LINES = Math.max(...FILES.map(f => f.lines));
const rad = d => Math.max(13, Math.min(54, 9 + Math.sqrt(d.lines) * 0.85));

let layerF = "all", riskF = "all", searchQ = "", selId = null, sim = null;

// ── D3 SETUP ──────────────────────────────────────────────────────────────────

const gc = document.getElementById("gc");
const W = () => gc.clientWidth, H = () => gc.clientHeight;
const svg = d3.select("#g");

const defs = svg.append("defs");
defs.append("marker").attr("id","arr").attr("viewBox","0 -4 8 8").attr("refX",8).attr("refY",0)
  .attr("markerWidth",5).attr("markerHeight",5).attr("orient","auto")
  .append("path").attr("d","M0,-4L8,0L0,4").attr("fill","#404040");

const zg = svg.append("g");
const bandsG = zg.append("g");
const lnkG = zg.append("g");
const ndG = zg.append("g");

const zoom = d3.zoom().scaleExtent([0.15,5]).on("zoom", e => zg.attr("transform",e.transform));
svg.call(zoom);
svg.on("dblclick.zoom", () => svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity));

// ── BUILD ─────────────────────────────────────────────────────────────────────

let posCache = {};

function build() {
  const visIds = new Set(FILES.filter(f => {
    if (layerF !== "all" && f.layer !== layerF) return false;
    if (riskF  !== "all" && f.risk  !== riskF)  return false;
    if (searchQ && !f.name.toLowerCase().includes(searchQ) && !f.role.toLowerCase().includes(searchQ)) return false;
    return true;
  }).map(f => f.id));

  const visFiles = FILES.filter(f => visIds.has(f.id));
  const visLinks = DEPS.filter(d => visIds.has(d.f) && visIds.has(d.t));
  document.getElementById("bs-nodes").textContent = visFiles.length;

  const cw = W(), ch = H();

  const simNodes = visFiles.map(f => ({
    ...f,
    x: posCache[f.id]?.x ?? cw * (LAYER_X[f.layer] || 0.5) + (Math.random()-.5)*60,
    y: posCache[f.id]?.y ?? ch * (LAYER_Y[f.layer] || 0.5) + (Math.random()-.5)*40,
    vx: posCache[f.id]?.vx ?? 0,
    vy: posCache[f.id]?.vy ?? 0,
  }));

  const byId = Object.fromEntries(simNodes.map(n => [n.id, n]));
  const simLinks = visLinks.filter(d => byId[d.f] && byId[d.t]).map(d => ({source:byId[d.f], target:byId[d.t]}));

  // Layer bands
  bandsG.selectAll("*").remove();
  const layers = [...new Set(visFiles.map(f => f.layer))];
  layers.forEach(ly => {
    const yc = ch * LAYER_Y[ly];
    bandsG.append("rect").attr("class","band-rect").attr("x",0).attr("y",yc-45).attr("width",cw).attr("height",90).attr("fill", LAYER_COL[ly]||"#111");
    bandsG.append("text").attr("class","band-lbl").attr("x",14).attr("y",yc+4).text(ly.toUpperCase());
  });

  // Links
  const lnk = lnkG.selectAll(".lnk").data(simLinks, d => d.source.id+"-"+d.target.id);
  lnk.exit().remove();
  const lnkEnter = lnk.enter().append("line").attr("class","lnk").attr("marker-end","url(#arr)");
  const allLnk = lnkEnter.merge(lnk);

  // Nodes
  const nd = ndG.selectAll(".nd").data(simNodes, d => d.id);
  nd.exit().transition().duration(180).attr("opacity",0).remove();
  const ndE = nd.enter().append("g").attr("class","nd").attr("opacity",0)
    .call(d3.drag().on("start",ds).on("drag",dd).on("end",de))
    .on("click", (e,d) => { e.stopPropagation(); clickNode(d); })
    .on("mouseover", (e,d) => showTT(e,d))
    .on("mousemove", e => moveTT(e))
    .on("mouseout", hideTT);
  ndE.transition().duration(250).attr("opacity",1);
  ndE.append("circle").attr("r", d => rad(d))
    .attr("fill", d => RISK_COL[d.risk]+"2a")
    .attr("stroke", d => RISK_COL[d.risk]).attr("stroke-width",1.5);
  ndE.append("text").attr("dy", d => rad(d)+11).text(d => d.name.replace(/\.(h|cpp)$/,"").replace("Component","Comp").replace("Processor","Proc"));
  const allNd = ndE.merge(nd);
  allNd.select("circle").attr("r", d => rad(d)).attr("fill", d => RISK_COL[d.risk]+"2a").attr("stroke", d => RISK_COL[d.risk]);

  if (sim) sim.stop();
  sim = d3.forceSimulation(simNodes)
    .force("link", d3.forceLink(simLinks).id(d=>d.id).distance(d => Math.max(85, rad(d.source)+rad(d.target)+55)).strength(0.25))
    .force("charge", d3.forceManyBody().strength(d => -Math.pow(rad(d),1.75)))
    .force("collide", d3.forceCollide(d => rad(d)+16).strength(0.85))
    .force("x", d3.forceX(d => cw*(LAYER_X[d.layer]||0.5)).strength(0.10))
    .force("y", d3.forceY(d => ch*(LAYER_Y[d.layer]||0.5)).strength(0.32))
    .alphaDecay(0.025)
    .on("tick", () => {
      allLnk
        .attr("x1", d=>d.source.x).attr("y1", d=>d.source.y)
        .attr("x2", d => { const dx=d.target.x-d.source.x,dy=d.target.y-d.source.y,dist=Math.sqrt(dx*dx+dy*dy)||1; return d.target.x - dx/dist*(rad(d.target)+5); })
        .attr("y2", d => { const dx=d.target.x-d.source.x,dy=d.target.y-d.source.y,dist=Math.sqrt(dx*dx+dy*dy)||1; return d.target.y - dy/dist*(rad(d.target)+5); });
      allNd.attr("transform", d => `translate(${d.x},${d.y})`);
      simNodes.forEach(n => { posCache[n.id] = {x:n.x, y:n.y, vx:n.vx, vy:n.vy}; });
    });

  return {allNd, allLnk, simNodes};
}

let {allNd, allLnk, simNodes} = build();

// ── SELECTION ─────────────────────────────────────────────────────────────────

function clickNode(d) {
  if (selId === d.id) { selId = null; clearSel(); emptyPanel(); return; }
  selId = d.id;
  const conn = new Set([d.id]);
  DEPS.forEach(dep => { if(dep.f===d.id) conn.add(dep.t); if(dep.t===d.id) conn.add(dep.f); });
  ndG.selectAll(".nd").classed("sel", n=>n.id===d.id).classed("dim", n=>!conn.has(n.id));
  lnkG.selectAll(".lnk")
    .classed("hi", l=>l.source.id===d.id||l.target.id===d.id)
    .attr("stroke", l => l.source.id===d.id||l.target.id===d.id ? RISK_COL[d.risk] : null);
  fillPanel(d);
}

svg.on("click", () => { if(selId){ selId=null; clearSel(); emptyPanel(); } });

function clearSel() {
  ndG.selectAll(".nd").classed("sel",false).classed("dim",false);
  lnkG.selectAll(".lnk").classed("hi",false).attr("stroke",null);
}

// ── PANEL ─────────────────────────────────────────────────────────────────────

function emptyPanel() {
  document.getElementById("panel-empty").style.display = "";
  document.getElementById("panel-body").style.display = "none";
}


// ── PANEL STATE ──────────────────────────────────────────────────────────────
let fnAccessFilter = "all"; // all | public | protected | private
let fnSearch = "";
let currentPanelFile = null;

function renderFunctions(d) {
  const fns = (FUNCTIONS[d.id] || []).filter(fn => {
    if (fnAccessFilter !== "all" && fn.access !== fnAccessFilter) return false;
    if (fnSearch) {
      const q = fnSearch.toLowerCase();
      if (!fn.sig.toLowerCase().includes(q) && !fn.desc.toLowerCase().includes(q) && !(fn.class||"").toLowerCase().includes(q)) return false;
    }
    return true;
  });

  // Group by class
  const groups = {};
  fns.forEach(fn => {
    const cls = fn.class || "(global)";
    if (!groups[cls]) groups[cls] = [];
    groups[cls].push(fn);
  });

  const total = (FUNCTIONS[d.id] || []).length;
  const accessColors = { public:"fn-pub", protected:"fn-prot", private:"fn-priv" };

  return `<div class="sec" id="fn-sec">
    <div class="sec-title">Functions / Methods <span class="fn-count">(${fns.length}${fns.length < total ? " of " + total : ""})</span></div>
    <div class="fn-filter-row">
      <button class="fn-fbtn ${fnAccessFilter==="all"?"on":""}" onclick="setFnFilter('all')">All</button>
      <button class="fn-fbtn ${fnAccessFilter==="public"?"on":""}" onclick="setFnFilter('public')">pub</button>
      <button class="fn-fbtn ${fnAccessFilter==="protected"?"on":""}" onclick="setFnFilter('protected')">prot</button>
      <button class="fn-fbtn ${fnAccessFilter==="private"?"on":""}" onclick="setFnFilter('private')">priv</button>
    </div>
    <input type="text" id="fn-search" placeholder="Search functions…" value="${fnSearch}" oninput="setFnSearch(this.value)" />
    ${Object.entries(groups).map(([cls, items]) => `
      <div class="fn-group">
        <div class="fn-group-title">${cls}</div>
        ${items.map(fn => `
          <div class="fn-item ${fn.access==="public"?"pub":fn.access==="protected"?"prot":"priv"}">
            <div class="fn-sig"><span class="fn-badge ${accessColors[fn.access]||"fn-priv"}">${fn.access?fn.access.slice(0,3):"?"}</span>${escHtml(fn.sig)}</div>
            <div class="fn-desc">${escHtml(fn.desc)}</div>
          </div>`).join("")}
      </div>`).join("")}
    ${fns.length === 0 ? '<div style="font-size:11px;color:var(--muted);padding:8px 0">No matching functions</div>' : ""}
  </div>`;
}

function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function setFnFilter(v) { fnAccessFilter = v; if (currentPanelFile) fillPanel(currentPanelFile); }
function setFnSearch(v) { fnSearch = v; if (currentPanelFile) fillPanel(currentPanelFile); }

function fillPanel(d) {
  currentPanelFile = d;
  document.getElementById("panel-empty").style.display = "none";
  const pb = document.getElementById("panel-body");
  pb.style.display = "block";
  const pct = Math.round(d.lines/MAX_LINES*100);
  const rc = RISK_COL[d.risk];
  const outDeps = DEPS.filter(dep=>dep.f===d.id).map(dep=>FILES.find(f=>f.id===dep.t)).filter(Boolean);
  const inDeps  = DEPS.filter(dep=>dep.t===d.id).map(dep=>FILES.find(f=>f.id===dep.f)).filter(Boolean);
  const fnTotal = (FUNCTIONS[d.id]||[]).length;
  pb.innerHTML = `
    <div class="p-name">${d.name}</div>
    <div class="p-path">${d.path}</div>
    <div class="p-badges">
      <span class="bdg bdg-${d.risk}">${d.risk.toUpperCase()}</span>
      <span class="bdg bdg-layer">${d.layer}</span>
      ${fnTotal ? `<span class="bdg bdg-layer">${fnTotal} fns</span>` : ""}
    </div>
    <div class="sec">
      <div class="sec-title">Lines of Code</div>
      <div class="bar-row">
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${rc}"></div></div>
        <span class="bar-val">${d.lines.toLocaleString()}</span>
      </div>
    </div>
    <div class="sec">
      <div class="sec-title">Role</div>
      <div class="p-role">${d.role}</div>
    </div>
    ${d.classes.length?`<div class="sec"><div class="sec-title">Classes / Structs (${d.classes.length})</div>${d.classes.map(c=>`<div class="cls-item"><div class="cls-name">${c.name}</div><div class="cls-role">${c.role}</div></div>`).join("")}</div>`:""}
    ${renderFunctions(d)}
    ${outDeps.length?`<div class="sec"><div class="sec-title">Depends on (${outDeps.length})</div>${outDeps.map(f=>`<div class="dep-item">${f.name}</div>`).join("")}</div>`:""}
    ${inDeps.length?`<div class="sec"><div class="sec-title">Used by (${inDeps.length})</div>${inDeps.map(f=>`<div class="dep-item in">${f.name}</div>`).join("")}</div>`:""}
    ${d.issues.length?`<div class="sec"><div class="sec-title">⚠ Issues (${d.issues.length})</div>${d.issues.map(i=>`<div class="iss-item">${i}</div>`).join("")}</div>`:""}
  `;
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────────

const tt = document.getElementById("tt");
function showTT(e,d){ document.getElementById("tt-name").textContent=d.name; document.getElementById("tt-sub").textContent=`${d.lines.toLocaleString()} lines · ${d.risk} · ${d.layer}`; tt.classList.add("vis"); moveTT(e); }
function moveTT(e){ tt.style.left=(e.clientX+14)+"px"; tt.style.top=(e.clientY-30)+"px"; }
function hideTT(){ tt.classList.remove("vis"); }

// ── DRAG ──────────────────────────────────────────────────────────────────────

function ds(e,d){ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; hideTT(); }
function dd(e,d){ d.fx=e.x; d.fy=e.y; }
function de(e,d){ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }

// ── FILTERS ───────────────────────────────────────────────────────────────────

document.querySelectorAll("#lf .fbtn").forEach(b => b.addEventListener("click",()=>{
  document.querySelectorAll("#lf .fbtn").forEach(x=>x.classList.remove("on")); b.classList.add("on");
  layerF=b.dataset.l; rebuild();
}));
document.querySelectorAll("#rf .fbtn").forEach(b => b.addEventListener("click",()=>{
  document.querySelectorAll("#rf .fbtn").forEach(x=>x.classList.remove("on")); b.classList.add("on");
  riskF=b.dataset.r; rebuild();
}));
let st; document.getElementById("search").addEventListener("input",e=>{ clearTimeout(st); st=setTimeout(()=>{ searchQ=e.target.value.trim().toLowerCase(); rebuild(); },200); });

function rebuild(){
  if(sim) sim.stop();
  lnkG.selectAll("*").remove(); ndG.selectAll("*").remove(); bandsG.selectAll("*").remove();
  selId=null; emptyPanel();
  ({allNd,allLnk,simNodes}=build());
}

// ── RESIZE ────────────────────────────────────────────────────────────────────

window.addEventListener("resize",()=>{
  if(sim){ sim.force("x",d3.forceX(d=>W()*(LAYER_X[d.layer]||.5)).strength(.10)).force("y",d3.forceY(d=>H()*(LAYER_Y[d.layer]||.5)).strength(.32)).alpha(.3).restart(); }
  bandsG.selectAll("rect.band-rect").attr("width",W());
});

// Initial auto-fit
setTimeout(()=>{
  const b = zg.node().getBBox();
  if(b.width>0){
    const cw=W(),ch=H(),pad=40,s=Math.min(cw/(b.width+pad*2),ch/(b.height+pad*2),1.2);
    svg.transition().duration(900).call(zoom.transform, d3.zoomIdentity.translate(cw/2-s*(b.x+b.width/2),ch/2-s*(b.y+b.height/2)).scale(s));
  }
},1600);
</script>
